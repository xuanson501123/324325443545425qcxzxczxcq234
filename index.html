<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport"
        content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
    <meta name="theme-color" content="#07080d" />
    <title>TipTip MOD – The Spike Cross</title>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #07080d;
            --text: #d6dbe8;
            --text-s: #e8ecf6;
            --hint: #8b93a8;
            --iris: #7b93e8;
            --violet: #a67ae0;
            --rose: #e87a9c;
            --amber: #e6c15a;
            --mint: #3fbf96;
            --cyan: #5bbfd9;
            --g1: rgba(255, 255, 255, .045);
            --g2: rgba(255, 255, 255, .08);
            --gb: rgba(255, 255, 255, .09);
            --gbh: rgba(255, 255, 255, .16);
            --shd: 0 4px 14px rgba(0, 0, 0, .3), 0 16px 40px rgba(0, 0, 0, .42);
            --ref: inset 0 1px 0 rgba(255, 255, 255, .1), inset 0 -1px 1px rgba(0, 0, 0, .15);
            --r-xl: 24px;
            --r-lg: 20px;
            --r-md: 16px;
            --r-sm: 12px;
            --ease-s: cubic-bezier(.34, 1.56, .64, 1);
            --ease-o: cubic-bezier(.2, .9, .2, 1);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent
        }

        html {
            scroll-behavior: smooth
        }

        html,
        body {
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            letter-spacing: -.01em;
            overflow-x: hidden;
            padding: max(16px, env(safe-area-inset-top)) 14px max(32px, env(safe-area-inset-bottom));
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background:
                radial-gradient(900px 600px at 80% -5%, rgba(108, 140, 255, .2), transparent 60%),
                radial-gradient(700px 500px at -5% 40%, rgba(177, 108, 255, .16), transparent 60%),
                radial-gradient(600px 500px at 55% 110%, rgba(255, 107, 154, .14), transparent 60%),
                var(--bg);
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(72px);
            opacity: .5;
            animation: fl 22s ease-in-out infinite;
            will-change: transform;
            pointer-events: none;
            z-index: -1
        }

        .b1 {
            width: 380px;
            height: 380px;
            background: var(--iris);
            top: -80px;
            left: -80px
        }

        .b2 {
            width: 280px;
            height: 280px;
            background: var(--violet);
            top: 35%;
            right: -90px;
            animation-delay: -8s
        }

        .b3 {
            width: 320px;
            height: 320px;
            background: var(--rose);
            bottom: -100px;
            left: 30%;
            animation-delay: -15s
        }

        @keyframes fl {

            0%,
            100% {
                transform: translate(0, 0) scale(1)
            }

            33% {
                transform: translate(30px, -25px) scale(1.06)
            }

            66% {
                transform: translate(-18px, 22px) scale(.96)
            }
        }

        .page {
            max-width: 520px;
            margin: 0 auto;
            position: relative;
            z-index: 1
        }

        /* live badge */
        .live-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            margin-bottom: 22px
        }

        .live-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--mint);
            box-shadow: 0 0 8px var(--mint);
            animation: pulse 1.6s ease-in-out infinite
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1)
            }

            50% {
                opacity: .35;
                transform: scale(.85)
            }
        }

        .live-badge span {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--hint)
        }

        /* hero card */
        .hero {
            background: linear-gradient(145deg, rgba(108, 140, 255, .12), rgba(177, 108, 255, .08) 50%, rgba(255, 107, 154, .07));
            border: 1px solid var(--gbh);
            border-radius: var(--r-xl);
            padding: 28px 22px 24px;
            backdrop-filter: blur(24px) saturate(1.5);
            -webkit-backdrop-filter: blur(24px) saturate(1.5);
            box-shadow: var(--shd), var(--ref);
            position: relative;
            overflow: hidden;
            margin-bottom: 14px;
            animation: sd .6s var(--ease-o) both;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--iris), var(--violet), var(--rose), transparent);
            opacity: .7
        }

        @keyframes sd {
            from {
                opacity: 0;
                transform: translateY(-14px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .game-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 13px;
            border-radius: 99px;
            background: rgba(123, 147, 232, .15);
            border: 1px solid rgba(123, 147, 232, .3);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: var(--iris);
            margin-bottom: 16px;
        }

        .hero-title {
            font-size: 32px;
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--text-s) 30%, var(--amber));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .version-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            flex-wrap: wrap
        }

        .ver-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 99px;
            background: rgba(91, 191, 217, .14);
            border: 1px solid rgba(91, 191, 217, .3);
            font-size: 11px;
            font-weight: 700;
            color: var(--cyan);
        }

        .ver-chip .vdot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--cyan)
        }

        .plat-chip {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 99px;
            background: var(--g1);
            border: 1px solid var(--gb);
            font-size: 11px;
            font-weight: 600;
            color: var(--hint);
        }

        .divider {
            height: 1px;
            background: var(--gb);
            margin: 0 -22px 20px
        }

        /* features */
        .feat-title {
            display: flex;
            align-items: center;
            gap: 9px;
            font-size: 10px;
            font-weight: 800;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--hint);
            margin-bottom: 12px;
        }

        .badge {
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: 800
        }

        .badge-free {
            background: rgba(63, 191, 150, .14);
            border: 1px solid rgba(63, 191, 150, .3);
            color: var(--mint)
        }

        .badge-vip2 {
            background: rgba(230, 193, 90, .14);
            border: 1px solid rgba(230, 193, 90, .3);
            color: var(--amber)
        }

        .feat-grid {
            display: grid;
            gap: 7px;
            margin-bottom: 18px
        }

        .feat-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: var(--g1);
            border: 1px solid var(--gb);
            border-radius: var(--r-sm);
            padding: 10px 13px;
            font-size: 13px;
            color: rgba(255, 255, 255, .78);
            line-height: 1.4;
            transition: border-color .2s, background .2s;
        }

        .feat-item:hover {
            border-color: var(--gbh);
            background: var(--g2)
        }

        .feat-ico {
            font-size: 15px;
            flex-shrink: 0;
            margin-top: 1px
        }

        /* warn box */
        .warn-box {
            background: rgba(232, 90, 120, .07);
            border: 1px solid rgba(232, 90, 120, .22);
            border-radius: var(--r-md);
            padding: 14px 16px;
            margin-bottom: 18px;
            display: flex;
            gap: 11px;
            align-items: flex-start;
        }

        .warn-icon {
            font-size: 18px;
            flex-shrink: 0;
            margin-top: 1px
        }

        .warn-text {
            font-size: 12.5px;
            color: rgba(255, 255, 255, .6);
            line-height: 1.7
        }

        .warn-text strong {
            color: #fca5a5
        }
    </style>
</head>

<body>
    <span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span>

    <div class="page">

        <div class="live-badge">
            <div class="live-dot"></div>
            <span>Tip Tip · iOS</span>
        </div>

        <!-- HERO -->
        <div class="hero">
            <div class="game-tag">🎮 The Spike Cross</div>
            <h1 class="hero-title">Tip Tip</h1>

            <div class="version-row">
                <div class="ver-chip">
                    <div class="vdot"></div><span id="heroVersion">Loading…</span>
                </div>
                <div class="plat-chip">📱 iOS / iPadOS</div>
            </div>

            <div class="divider"></div>
            <!-- DOWNLOAD CARD -->
            <div id="dlCard"></div>

            <!-- ADMIN -->
            <a href="https://t.me/tiptipiosmod" target="_blank" rel="noopener" id="adminCard"></a>

            <div
                style="text-align:center;margin-top:20px;font-size:11px;color:var(--hint);opacity:.5;letter-spacing:.03em">
                T.me/gamemodios &nbsp;·&nbsp; TipTip © 2026
            </div>
        </div>

    </div>

    <style>
        /* download card */
        .dl-card {
            background: var(--g1);
            border: 1px solid var(--gb);
            border-radius: var(--r-lg);
            padding: 20px 18px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: var(--ref);
            margin-bottom: 14px;
        }

        .dl-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px
        }

        .dl-icon {
            width: 48px;
            height: 48px;
            border-radius: 15px;
            flex-shrink: 0;
            background: linear-gradient(135deg, rgba(123, 147, 232, .25), rgba(166, 122, 224, .18));
            border: 1px solid rgba(123, 147, 232, .25);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 5px 16px rgba(0, 0, 0, .3);
        }

        .dl-name {
            font-size: 14px;
            font-weight: 800;
            color: var(--text-s);
            margin-bottom: 3px
        }

        .dl-ver {
            font-size: 11px;
            color: var(--hint);
            display: flex;
            align-items: center;
            gap: 6px
        }

        .dl-ver span {
            background: rgba(91, 191, 217, .14);
            color: var(--cyan);
            border: 1px solid rgba(91, 191, 217, .25);
            border-radius: 99px;
            padding: 2px 8px;
            font-size: 10px;
            font-weight: 700;
        }

        .btn-step {
            width: 100%;
            padding: 13px 16px;
            border: 0;
            border-radius: var(--r-md);
            margin-bottom: 9px;
            font-family: inherit;
            font-size: 13.5px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform .2s var(--ease-s), opacity .15s;
            letter-spacing: -.01em;
        }

        .btn-step:active {
            transform: scale(.97)
        }

        .active-step {
            background: linear-gradient(135deg, #0088cc, #0055aa);
            color: #fff;
            box-shadow: 0 5px 18px rgba(0, 136, 204, .35)
        }

        .locked-step {
            background: var(--g1);
            border: 1px dashed var(--gb);
            color: var(--hint);
            cursor: not-allowed;
            opacity: .5
        }

        .done-step {
            background: linear-gradient(135deg, var(--mint), #16a34a);
            color: #fff;
            box-shadow: 0 4px 14px rgba(63, 191, 150, .3);
            cursor: default;
            pointer-events: none
        }

        .btn-unlock {
            width: 100%;
            padding: 13px;
            border: 0;
            border-radius: var(--r-md);
            margin-bottom: 8px;
            font-family: inherit;
            font-size: 13.5px;
            font-weight: 800;
            cursor: pointer;
            background: linear-gradient(135deg, var(--amber), #c9860a);
            color: #07080d;
            box-shadow: 0 5px 18px rgba(230, 193, 90, .35);
            transition: transform .2s var(--ease-s);
        }

        .btn-unlock:active {
            transform: scale(.97)
        }

        .btn-unlock.done {
            background: linear-gradient(135deg, var(--mint), #16a34a);
            color: #fff;
            pointer-events: none
        }

        .unlock-hint {
            text-align: center;
            font-size: 11.5px;
            color: var(--hint);
            margin-bottom: 12px
        }

        .btn-dl {
            width: 100%;
            padding: 14px;
            border: 0;
            border-radius: var(--r-md);
            font-family: inherit;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            background: linear-gradient(135deg, var(--iris), var(--violet));
            color: #f2f4fa;
            box-shadow: 0 6px 20px rgba(123, 147, 232, .35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            transition: transform .2s var(--ease-s);
            margin-bottom: 14px;
        }

        .btn-dl:active {
            transform: scale(.97)
        }

        .btn-dl.locked {
            background: var(--g1);
            border: 1px dashed var(--gb);
            color: var(--hint);
            box-shadow: none;
            cursor: not-allowed;
            pointer-events: none;
        }

        .meta-pills {
            display: flex;
            gap: 7px;
            flex-wrap: wrap
        }

        .meta-pill {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 99px;
            background: var(--g1);
            border: 1px solid var(--gb);
            font-size: 11px;
            color: var(--hint);
        }

        .meta-pill .mpdot {
            width: 5px;
            height: 5px;
            border-radius: 50%
        }

        /* social */
        .social-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px
        }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 6px;
            border-radius: var(--r-sm);
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            border: 1px solid transparent;
            transition: transform .2s, background .2s;
        }

        .btn-social:active {
            transform: scale(.96)
        }

        .btn-tg {
            background: rgba(0, 136, 204, .14);
            border-color: rgba(0, 136, 204, .3);
            color: #60c8f5
        }

        .btn-spike {
            background: rgba(230, 193, 90, .12);
            border-color: rgba(230, 193, 90, .28);
            color: var(--amber)
        }

        .btn-dc {
            background: rgba(88, 101, 242, .14);
            border-color: rgba(88, 101, 242, .3);
            color: #8b9ef7
        }

        /* admin card */
        a#adminCard {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: var(--g1);
            border: 1px solid var(--gb);
            border-radius: var(--r-lg);
            text-decoration: none;
            transition: border-color .2s, background .2s;
            box-shadow: var(--ref);
            margin-bottom: 0;
        }

        a#adminCard:hover {
            border-color: var(--gbh);
            background: var(--g2)
        }

        .admin-ava {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            flex-shrink: 0;
            background: linear-gradient(135deg, #0088cc, #0055aa);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 5px 14px rgba(0, 136, 204, .35);
        }

        .admin-info {
            flex: 1
        }

        .admin-name {
            font-size: 14px;
            font-weight: 800;
            color: var(--text-s)
        }

        .admin-handle {
            font-size: 11.5px;
            color: var(--hint);
            margin-top: 2px
        }

        .admin-arr {
            color: var(--hint);
            font-size: 20px
        }
    </style>

    <script>
        const AD_URL = 'https://s.shopee.vn/7VELJqmITK';
        const STEPS = [
            { url: 'https://t.me/gamemodios', label: '✈️ Telegram' },
            { url: 'https://t.me/modspike', label: '🏐 Telegram The Spike' },
            { url: 'https://discord.gg/p7P4KqhPZg', label: '🎮 Discord' },
        ];

        let ipaUrl = '#', currentStep = 0, unlocked = false;

        async function loadUpdate() {
            try {
                const res = await fetch('Update.json?t=' + Date.now());
                const data = await res.json();
                const ver = data.version || '—';
                ipaUrl = data.downloadURL || '#';
                document.getElementById('heroVersion').textContent = '📱 Ver ' + ver;
                document.getElementById('dlVersionChip').textContent = 'v' + ver;
            } catch {
                document.getElementById('heroVersion').textContent = '📱 The Spike Cross MOD';
                document.getElementById('dlVersionChip').textContent = 'N/A';
            }
        }

        function buildCards() {
            // Download card
            document.getElementById('dlCard').innerHTML = `
    <div class="dl-card">
      <div class="dl-header">
        <div class="dl-icon">📦</div>
        <div>
          <div class="dl-name">TSC·TipTip 🐧🐧🐧.ipa</div>
          <div class="dl-ver">Latest &nbsp;<span id="dlVersionChip">…</span></div>
        </div>
      </div>
      <button id="btn1" class="btn-step active-step"  onclick="handleStep(1)">${STEPS[0].label}</button>
      <button id="btn2" class="btn-step locked-step"  onclick="handleStep(2)" disabled>${STEPS[1].label}</button>
      <button id="btn3" class="btn-step locked-step"  onclick="handleStep(3)" disabled>${STEPS[2].label}</button>
      <button id="btnUnlock" class="btn-unlock" onclick="handleUnlock()" disabled style="opacity:.38;cursor:not-allowed">🔓 Confirm &amp; Unlock</button>
      <p class="unlock-hint" id="unlockHint">👆 Nhấn từng nút theo thứ tự để mở khóa</p>
      <a id="btnDownload" href="#" class="btn-dl locked" onclick="handleDownload(event)">🔒 Download IPA ↓</a>
      <div class="meta-pills">
        <div class="meta-pill"><div class="mpdot" style="background:var(--mint)"></div>iOS Only</div>
        <div class="meta-pill"><div class="mpdot" style="background:var(--amber)"></div>Free</div>
        <div class="meta-pill"><div class="mpdot" style="background:var(--violet)"></div>TipTip</div>
      </div>
    </div>
  `;
            // Admin card
            document.getElementById('adminCard').innerHTML = `
    <div class="admin-ava">✈️</div>
    <div class="admin-info">
      <div class="admin-name">Admin TipTip</div>
      <div class="admin-handle">@tiptipiosmod · Telegram</div>
    </div>
    <span class="admin-arr">›</span>
  `;
        }

        function handleStep(step) {
            if (step !== currentStep + 1) return;
            window.open(STEPS[step - 1].url, '_blank', 'noopener');
            const btn = document.getElementById('btn' + step);
            btn.className = 'btn-step done-step';
            btn.textContent = '✅ ' + STEPS[step - 1].label.replace(/^\S+\s/, '') + ' — Done!';
            btn.disabled = true;
            currentStep = step;
            if (step < STEPS.length) {
                const next = document.getElementById('btn' + (step + 1));
                next.className = 'btn-step active-step'; next.disabled = false;
                document.getElementById('unlockHint').textContent = '👆 Tiếp theo: ' + STEPS[step].label;
            } else {
                const u = document.getElementById('btnUnlock');
                u.disabled = false; u.style.opacity = '1'; u.style.cursor = 'pointer';
                document.getElementById('unlockHint').textContent = '🔓 Nhấn Confirm để lấy link tải!';
            }
        }

        function handleUnlock() {
            if (currentStep < STEPS.length) return;
            window.open(AD_URL, '_blank', 'noopener');
            unlocked = true;
            const btnDl = document.getElementById('btnDownload');
            const btnU = document.getElementById('btnUnlock');
            btnDl.classList.remove('locked');
            btnDl.textContent = '⬇️ Download IPA ↓';
            btnU.className = 'btn-unlock done'; btnU.textContent = '✅ Unlocked!'; btnU.disabled = true;
            document.getElementById('unlockHint').textContent = '✅ Nhấn Download IPA để tải file';
        }

        function handleDownload(e) {
            e.preventDefault();
            if (!unlocked || !ipaUrl || ipaUrl === '#') return;
            window.location.href = 'https://vuotlink.net/st?api=4e2b672bf2a8ba8ead742b4f9c07db7e690505a2&url=' + encodeURIComponent(ipaUrl);
        }

        buildCards();
        loadUpdate();
    </script>
</body>

</html>
